<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Praktikan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background gradien tetap dipertahankan */
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px; /* Tambah padding agar tidak mentok atas-bawah */
        }

        /* Glassmorphism yang lebih realistis */
        .form-container {
            background: rgba(255, 255, 255, 0.45); /* Dibuat lebih transparan */
            backdrop-filter: blur(15px); /* Efek blur ditingkatkan */
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 550px; /* Sedikit dilebarkan */
            padding: 40px; /* Ruang dalam diperbesar */
            border-radius: 20px; /* Ujung lebih membulat */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h3 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px; /* Jarak antar input diperbesar */
        }

        .form-group label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: #34495e;
            letter-spacing: 0.5px;
        }

        /* Styling Input yang lebih "Plump" dan Elegan */
        .form-input input[type="text"],
        .form-input input[type="password"],
        .form-input input[type="email"],
        .form-input select,
        .form-input textarea {
            width: 100%;
            padding: 12px 16px; /* Input dibuat sedikit lebih tinggi */
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.7);
            color: #333;
        }

        /* Efek Focus yang lebih tajam */
        .form-input input:focus,
        .form-input select:focus,
        .form-input textarea:focus {
            border-color: #74ebd5;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(116, 235, 213, 0.2);
            outline: none;
        }

        .form-input input[readonly] {
            background-color: rgba(233, 236, 239, 0.6);
            cursor: not-allowed;
            color: #666;
        }

        /* Mewarnai Checkbox & Radio Button secara modern */
        input[type="radio"], 
        input[type="checkbox"] {
            accent-color: #55c7b3; /* Ubah warnanya agar senada dengan background */
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #444;
            align-items: center;
        }

        .radio-group label, .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px; /* Jarak antara bulatan radio dengan teks */
            cursor: pointer;
            margin-bottom: 0;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 35px;
        }

        /* Styling Tombol */
        .button-group button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-cancel {
            background-color: rgba(255, 255, 255, 0.6);
            color: #555;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        .btn-submit {
            background: linear-gradient(135deg, #55c7b3 0%, #8795cf 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(85, 199, 179, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(85, 199, 179, 0.6);
        }
    </style>
</head>

        <div class="form-group">
            <label>Username</label>

                <input type="text" value="Praktikum" readonly>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="form-input">
                <input type="password" value="12345678" placeholder="Masukkan Password">
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="form-input">
                <input type="email" placeholder="Input Email">
            </div>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="form-input radio-group">
                <label><input type="radio" name="jk" value="Pria" checked> Pria</label>
                <label><input type="radio" name="jk" value="Wanita"> Wanita</label>
            </div>

        <div class="form-group">

        <div class="form-group">

            <div class="form-input">
                <textarea rows="4" placeholder="Tulis kritik & saran di sini..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button type="button" class="btn-cancel">Cancel</button>
            <button type="submit" class="btn-submit">Submit</button>
        </div>

    </form>
</div>
