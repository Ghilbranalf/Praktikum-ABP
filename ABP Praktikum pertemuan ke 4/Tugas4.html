<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial Ramadan</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* RESET & FONT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* BACKGROUND & ANIMASI BINTANG */
        body {
            background: linear-gradient(to bottom, #020111 0%, #20124d 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Untuk efek 3D */
            color: #fff;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 0;
        }

        /* GLASSMORPHISM CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            z-index: 10;
            transition: transform 0.1s ease; /* Transisi halus untuk tilt */
            transform-style: preserve-3d;
        }

        .glass-card h1 {
            font-size: 2.2rem;
            color: #f8d25c;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(248, 210, 92, 0.5);
            transform: translateZ(50px); /* Efek melayang 3D */
        }

        .typing-container {
            min-height: 60px;
            margin-bottom: 25px;
            transform: translateZ(30px);
        }

        #typing-text {
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.5;
        }

        /* BUTTONS */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            transform: translateZ(40px);
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-thr {
            background: linear-gradient(45deg, #f8d25c, #e3b04b);
            color: #1a1a1a;
            box-shadow: 0 0 20px rgba(248, 210, 92, 0.4);
        }

        .btn-thr:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(248, 210, 92, 0.7);
        }

        .btn-pengirim {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .btn-pengirim:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* INFO PENGIRIM */
        #info-pengirim {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #f8d25c;
            display: none; /* Disembunyikan default */
            transform: translateZ(20px);
        }

        /* MODAL POP-UP */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            transform: scale(0.7);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efek pantulan */
            border: 5px solid #f8d25c;
        }

        .modal-show .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal-content h2 {
            color: #e3b04b;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .modal-content p {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .close-modal {
            background: #e74c3c;
            color: #fff;
            margin-top: 15px;
        }

        .close-modal:hover {
            background: #c0392b;
        }

        /* KETUPAT ANIMATION */
        .ketupat {
            font-size: 60px;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars-bg"></div>

    <div class="glass-card" id="card">
        <h1>✨ Berkah Ramadan ✨</h1>
        
        <div class="typing-container">
            <span id="typing-text"></span><span id="cursor">|</span>
        </div>

        <div class="btn-container">
            <button id="btn-thr" class="btn-thr">Buka Kejutan THR 🎁</button>
            <button id="btn-pengirim" class="btn-pengirim">Tampilkan Dari 👤</button>
        </div>

        <div id="info-pengirim">
            <p>Dikirim oleh: <strong>Sahabatmu</strong><br>Semoga harimu menyenangkan!</p>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="ketupat">💸</div>
            <h2>SELAMAT!</h2>
            <p><strong>Anda Mendapatkan THR!</strong></p>
            <p style="font-size: 0.9rem; color: #7f8c8d;">(Hehe, THR doa dan senyuman ya! 😄)</p>
            <button class="close-modal" id="btn-close">Tutup</button>
        </div>
    </div>

    <script>
        // 1. GENERATE BACKGROUND BINTANG
        function createStars() {
            const starsContainer = document.getElementById('stars-bg');
            for (let i = 0; i < 100; i++) {
                let star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.backgroundColor = '#fff';
                star.style.borderRadius = '50%';
                star.style.opacity = Math.random();
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // 2. EFEK 3D CARD TILT (Kartu mengikuti mouse)
        $(document).on('mousemove', function(e) {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            $('#card').css('transform', `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`);
        });

        // Kembalikan posisi kartu saat mouse keluar dari layar
        $(document).on('mouseleave', function() {
            $('#card').css('transform', `rotateY(0deg) rotateX(0deg)`);
            $('#card').css('transition', 'transform 0.5s ease');
        });

        $(document).on('mouseenter', function() {
            $('#card').css('transition', 'none'); // Matikan transisi agar tilt responsif
        });

        // 3. EFEK TYPING
        const textToType = "Selamat menunaikan ibadah puasa. Semoga segala amal ibadah kita diterima dan selalu diberikan keberkahan.";
        let index = 0;
        
        function typeWriter() {
            if (index < textToType.length) {
                document.getElementById("typing-text").innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeWriter, 50); // Kecepatan mengetik
            } else {
                // Kedipkan kursor setelah selesai
                setInterval(() => {
                    $('#cursor').toggle();
                }, 500);
            }
        }

        $(document).ready(function() {
            // Mulai ngetik saat halaman dimuat
            setTimeout(typeWriter, 500);

            // 4. JQUERY HIDE/SHOW PENGIRIM
            $("#btn-pengirim").click(function() {
                $("#info-pengirim").slideToggle("fast", function() {
                    // Ubah teks tombol berdasarkan status
                    if ($("#info-pengirim").is(":visible")) {
                        $("#btn-pengirim").html("Sembunyikan 👤");
                    } else {
                        $("#btn-pengirim").html("Tampilkan Dari 👤");
                    }
                });
            });

            // 5. JQUERY BUKA MODAL & CONFETTI
            $("#btn-thr").click(function() {
                $("#modal").css('display', 'flex').hide().fadeIn(300, function() {
                    $("#modal").addClass("modal-show");
                    
                    // Trigger Confetti
                    let duration = 3 * 1000;
                    let animationEnd = Date.now() + duration;
                    let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

                    function randomInRange(min, max) {
                        return Math.random() * (max - min) + min;
                    }

                    let interval = setInterval(function() {
                        let timeLeft = animationEnd - Date.now();

                        if (timeLeft <= 0) {
                            return clearInterval(interval);
                        }

                        let particleCount = 50 * (timeLeft / duration);
                        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                    }, 250);
                });
            });

            // 6. TUTUP MODAL
            $("#btn-close, .modal-overlay").click(function(e) {
                if (e.target !== this) return; // Mencegah klik di dalam konten modal menutup modal
                
                $("#modal").removeClass("modal-show");
                setTimeout(function() {
                    $("#modal").fadeOut(300);
                }, 300); // Sesuaikan dengan durasi CSS transition
            });
        });
    </script>
</body>
</html>
