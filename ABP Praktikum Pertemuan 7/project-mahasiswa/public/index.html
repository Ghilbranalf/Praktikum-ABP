<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sistem Informasi Mahasiswa</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b25;
    --card: #1c2333;
    --border: #2a3347;
    --accent: #4f9cf9;
    --accent2: #7c5cbf;
    --green: #3ecf8e;
    --red: #ff4757;
    --amber: #f5a623;
    --text: #e2e8f0;
    --muted: #7a8499;
    --font: 'Sora', sans-serif;
    --mono: 'Space Mono', monospace;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  /* ===== HEADER ===== */
  header {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:0 2rem;
    display:flex; align-items:center; justify-content:space-between;
    height:60px; position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--mono); font-size:13px; color:var(--accent); letter-spacing:.05em; }
  .logo span { color:var(--muted); }
  .db-status { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
  .dot.err { background:var(--red); box-shadow:0 0 6px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  /* ===== LAYOUT ===== */
  .container { max-width:1140px; margin:0 auto; padding:2rem; }

  /* ===== STATS ===== */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.75rem; }
  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:1.2rem;
    transition:border-color .2s, transform .15s;
  }
  .stat-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
  .stat-value { font-family:var(--mono); font-size:26px; font-weight:700; color:var(--accent); }
  .stat-value.green  { color:var(--green); }
  .stat-value.purple { color:#9f7aea; }
  .stat-value.amber  { color:var(--amber); }

  /* ===== PANEL ===== */
  .panel { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:1.5rem; }
  .panel-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap; }
  .panel-title  { font-size:13px; font-weight:600; letter-spacing:.03em; white-space:nowrap; }

  /* ===== BUTTON ===== */
  .btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:7px 14px; border-radius:7px;
    font-size:12px; font-weight:500; cursor:pointer;
    border:none; transition:all .15s; font-family:var(--font);
    white-space:nowrap;
  }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-primary  { background:var(--accent); color:#fff; }
  .btn-primary:hover:not(:disabled)  { filter:brightness(1.12); }
  .btn-success  { background:var(--green); color:#0e1117; }
  .btn-success:hover:not(:disabled)  { filter:brightness(1.1); }
  .btn-ghost    { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover:not(:disabled)    { background:var(--surface); color:var(--text); }
  .btn-edit     { background:#4f9cf918; color:var(--accent); border:1px solid #4f9cf940; }
  .btn-edit:hover { background:#4f9cf930; }
  .btn-danger   { background:#ff475718; color:var(--red); border:1px solid #ff475740; }
  .btn-danger:hover { background:#ff475730; }
  .btn-sm { padding:4px 10px; font-size:11px; }

  /* ===== TOOLBAR ===== */
  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .search-wrap { position:relative; }
  .search-wrap input { padding-left:28px; width:210px; }
  .search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:12px; pointer-events:none; }
  select.filter { background:var(--surface); border:1px solid var(--border); border-radius:7px; padding:7px 10px; color:var(--text); font-size:12px; font-family:var(--font); outline:none; transition:border-color .2s; }
  select.filter:focus { border-color:var(--accent); }
  select.filter option { background:var(--surface); }

  /* ===== TABLE ===== */
  .tbl-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:.7rem 1.25rem; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid var(--border); font-weight:500; white-space:nowrap; }
  td { padding:.8rem 1.25rem; border-bottom:1px solid #1e2638; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(79,156,249,.03); }
  .nim  { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .badge { display:inline-block; padding:2px 9px; border-radius:4px; font-size:11px; font-weight:500; }
  .badge-ti { background:#4f9cf920; color:var(--accent); }
  .badge-si { background:#9f7aea20; color:#9f7aea; }
  .badge-ik { background:#3ecf8e20; color:var(--green); }
  .ipk-high { color:var(--green); font-weight:600; }
  .ipk-mid  { color:var(--amber); font-weight:500; }
  .ipk-low  { color:var(--red); }
  .actions  { display:flex; gap:6px; }
  .empty-row td { text-align:center; color:var(--muted); padding:3rem; }

  /* ===== FORM ===== */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:1.25rem; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group.full { grid-column:1/-1; }
  label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  input, select.form-select {
    background:var(--surface); border:1px solid var(--border);
    border-radius:7px; padding:8px 10px; color:var(--text);
    font-size:13px; font-family:var(--font); outline:none;
    transition:border-color .2s; width:100%;
  }
  input:focus, select.form-select:focus { border-color:var(--accent); }
  input.err-field, select.form-select.err-field { border-color:var(--red); }
  select.form-select option { background:var(--surface); }
  .form-footer { padding:.75rem 1.25rem; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
  .field-err { font-size:11px; color:var(--red); margin-top:2px; }

  /* ===== MODAL ===== */
  .modal-bg {
    position:fixed; inset:0; background:#0008;
    display:none; align-items:center; justify-content:center;
    z-index:200; backdrop-filter:blur(3px);
  }
  .modal-bg.open { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; width:560px; max-width:95vw;
    max-height:90vh; overflow-y:auto;
    animation:modalIn .2s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)} }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
  .modal-title  { font-size:14px; font-weight:600; }
  .modal-close  { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:2px 6px; border-radius:4px; line-height:1; }
  .modal-close:hover { background:var(--surface); color:var(--text); }

  /* ===== TOAST ===== */
  #toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--card); border:1px solid var(--border);
    border-radius:9px; padding:10px 16px;
    font-size:13px; opacity:0; transform:translateY(8px);
    transition:all .25s; pointer-events:none; z-index:999;
    max-width:320px; word-break:break-word;
  }
  #toast.show { opacity:1; transform:translateY(0); }
  #toast.ok  { border-color:var(--green); color:var(--green); }
  #toast.err { border-color:var(--red);   color:var(--red); }

  /* ===== LOADER ===== */
  .loading { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ===== RESPONSIVE ===== */
  @media(max-width:700px) {
    .stats { grid-template-columns:1fr 1fr; }
    .form-grid { grid-template-columns:1fr; }
    .form-group.full { grid-column:1; }
    .container { padding:1rem; }
    header { padding:0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>mahasiswa</span> </div>
  <div class="db-status">
    <div class="dot" id="db-dot"></div>
    <span id="db-label">Menghubungkan...</span>
  </div>
</header>

<div class="container">

  <!-- STATISTIK -->
  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-label">Total Mahasiswa</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Rata-rata IPK</div><div class="stat-value green" id="s-ipk">—</div></div>
    <div class="stat-card"><div class="stat-label">Jurusan</div><div class="stat-value purple" id="s-jurusan">—</div></div>
    <div class="stat-card"><div class="stat-label">Cum Laude (≥3.5)</div><div class="stat-value amber" id="s-cumlaude">—</div></div>
  </div>

  <!-- FORM TAMBAH -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">＋ Tambah Mahasiswa Baru</span>
      <button class="btn btn-ghost btn-sm" onclick="toggleForm()">Tutup</button>
    </div>
    <div id="form-wrap">
      <div class="form-grid">
        <div class="form-group">
          <label>NIM * <span style="color:var(--muted);font-size:10px">(10-12 digit)</span></label>
          <input id="f-nim" placeholder="2024001001" maxlength="12" inputmode="numeric">
          <div class="field-err" id="e-nim"></div>
        </div>
        <div class="form-group">
          <label>Nama Lengkap *</label>
          <input id="f-nama" placeholder="Nama mahasiswa">
          <div class="field-err" id="e-nama"></div>
        </div>
        <div class="form-group">
          <label>Jurusan *</label>
          <select id="f-jurusan" class="form-select">
            <option value="">-- Pilih Jurusan --</option>
            <option>Teknik Informatika</option>
            <option>Sistem Informasi</option>
            <option>Ilmu Komputer</option>
          </select>
          <div class="field-err" id="e-jurusan"></div>
        </div>
        <div class="form-group">
          <label>Angkatan *</label>
          <input id="f-angkatan" type="number" placeholder="2024" min="2000" max="2099" inputmode="numeric">
          <div class="field-err" id="e-angkatan"></div>
        </div>
        <div class="form-group">
          <label>IPK <span style="color:var(--muted);font-size:10px">(0.00 – 4.00)</span></label>
          <input id="f-ipk" type="number" step="0.01" min="0" max="4" placeholder="3.75">
          <div class="field-err" id="e-ipk"></div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="f-email" type="email" placeholder="nama@kampus.ac.id">
          <div class="field-err" id="e-email"></div>
        </div>
        <div class="form-group full">
          <label>No. HP</label>
          <input id="f-hp" placeholder="08123456789" maxlength="15" inputmode="tel">
          <div class="field-err" id="e-hp"></div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="resetForm()">Reset</button>
        <button class="btn btn-primary" id="btn-simpan" onclick="simpanMahasiswa()">
          Simpan ke Database
        </button>
      </div>
    </div>
  </div>

  <!-- TABEL DATA -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Data Mahasiswa</span>
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="search" placeholder="Cari nama / NIM..." oninput="onSearch()">
        </div>
        <select class="filter" id="filter-jurusan" onchange="onSearch()">
          <option value="">Semua Jurusan</option>
          <option>Teknik Informatika</option>
          <option>Sistem Informasi</option>
          <option>Ilmu Komputer</option>
        </select>
        <select class="filter" id="filter-angkatan" onchange="onSearch()">
          <option value="">Semua Angkatan</option>
        </select>
        <select class="filter" id="filter-sort" onchange="onSearch()">
          <option value="created_at|DESC">Terbaru</option>
          <option value="nama|ASC">Nama A-Z</option>
          <option value="ipk|DESC">IPK Tertinggi</option>
          <option value="angkatan|DESC">Angkatan Terbaru</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Jurusan</th>
            <th>Angkatan</th>
            <th>IPK</th>
            <th>Email</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr class="empty-row"><td colspan="7"><span class="loading"></span> Memuat data dari PostgreSQL...</td></tr>
        </tbody>
      </table>
    </div>
    <div id="tbl-footer" style="padding:.75rem 1.25rem; font-size:12px; color:var(--muted); border-top:1px solid var(--border); display:none;"></div>
  </div>

</div>

<!-- ===================== MODAL EDIT ===================== -->
<div class="modal-bg" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Edit Data Mahasiswa</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="form-grid">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>NIM *</label>
        <input id="edit-nim" placeholder="NIM" maxlength="12" inputmode="numeric">
        <div class="field-err" id="ee-nim"></div>
      </div>
      <div class="form-group">
        <label>Nama Lengkap *</label>
        <input id="edit-nama" placeholder="Nama mahasiswa">
        <div class="field-err" id="ee-nama"></div>
      </div>
      <div class="form-group">
        <label>Jurusan *</label>
        <select id="edit-jurusan" class="form-select">
          <option value="">-- Pilih --</option>
          <option>Teknik Informatika</option>
          <option>Sistem Informasi</option>
          <option>Ilmu Komputer</option>
        </select>
        <div class="field-err" id="ee-jurusan"></div>
      </div>
      <div class="form-group">
        <label>Angkatan *</label>
        <input id="edit-angkatan" type="number" min="2000" max="2099" inputmode="numeric">
        <div class="field-err" id="ee-angkatan"></div>
      </div>
      <div class="form-group">
        <label>IPK</label>
        <input id="edit-ipk" type="number" step="0.01" min="0" max="4">
        <div class="field-err" id="ee-ipk"></div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="edit-email" type="email">
        <div class="field-err" id="ee-email"></div>
      </div>
      <div class="form-group full">
        <label>No. HP</label>
        <input id="edit-hp" maxlength="15" inputmode="tel">
        <div class="field-err" id="ee-hp"></div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-success" id="btn-update" onclick="updateMahasiswa()">
        Simpan Perubahan
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api';

// =====================
// Init
// =====================
async function init() {
  await checkHealth();
  await loadData();
}

async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const j = await r.json();
    const dot = document.getElementById('db-dot');
    const lbl = document.getElementById('db-label');
    if (j.success) {
      dot.className = 'dot';
      lbl.textContent = 'PostgreSQL connected';
    } else {
      dot.className = 'dot err';
      lbl.textContent = 'Database error';
    }
  } catch {
    document.getElementById('db-dot').className = 'dot err';
    document.getElementById('db-label').textContent = 'Server offline';
  }
}

// =====================
// Load & Render Data
// =====================
async function loadData(params = {}) {
  const url = new URL(`${location.origin}${API}/mahasiswa`);
  Object.entries(params).forEach(([k,v]) => v && url.searchParams.set(k, v));

  try {
    const r    = await fetch(url);
    const json = await r.json();
    const data = json.data || [];
    renderTable(data);
    buildAngkatanFilter(data);
    updateFooter(json.total, Object.values(params).some(Boolean));
    await loadStats();
  } catch(e) {
    showToast('Gagal terhubung ke server', 'err');
    document.getElementById('tbl-body').innerHTML =
      `<tr class="empty-row"><td colspan="7">❌ Gagal memuat data. Periksa koneksi server.</td></tr>`;
  }
}

function buildAngkatanFilter(data) {
  const sel   = document.getElementById('filter-angkatan');
  const curr  = sel.value;
  const years = [...new Set(data.map(m => m.angkatan))].sort((a,b) => b-a);
  sel.innerHTML = `<option value="">Semua Angkatan</option>` +
    years.map(y => `<option ${y == curr ? 'selected':''} value="${y}">${y}</option>`).join('');
}

async function loadStats() {
  try {
    const r    = await fetch(`${API}/statistik`);
    const json = await r.json();
    const d    = json.data;
    document.getElementById('s-total').textContent    = d.total_mahasiswa;
    document.getElementById('s-ipk').textContent      = d.rata_ipk ?? '—';
    document.getElementById('s-jurusan').textContent  = d.total_jurusan;
    document.getElementById('s-cumlaude').textContent = d.mahasiswa_cumlaude;
  } catch {}
}

function renderTable(data) {
  const tbody = document.getElementById('tbl-body');
  if (!data.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Tidak ada data mahasiswa ditemukan</td></tr>`;
    return;
  }

  const badgeMap = {
    'Teknik Informatika': 'badge-ti',
    'Sistem Informasi':   'badge-si',
    'Ilmu Komputer':      'badge-ik'
  };

  tbody.innerHTML = data.map(m => {
    const ipkClass = m.ipk >= 3.5 ? 'ipk-high' : m.ipk >= 3.0 ? 'ipk-mid' : 'ipk-low';
    const ipkVal   = m.ipk ? parseFloat(m.ipk).toFixed(2) : '0.00';
    const badge    = badgeMap[m.jurusan] || '';
    return `<tr>
      <td class="nim">${esc(m.nim)}</td>
      <td style="font-weight:500">${esc(m.nama)}</td>
      <td><span class="badge ${badge}">${esc(m.jurusan)}</span></td>
      <td>${m.angkatan}</td>
      <td class="${ipkClass}">${ipkVal}</td>
      <td style="color:var(--muted);font-size:12px">${esc(m.email||'—')}</td>
      <td>
        <div class="actions">
          <button class="btn btn-edit btn-sm" onclick="openEdit(${m.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="hapus(${m.id},'${esc(m.nama)}')">Hapus</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function updateFooter(total, isFiltered) {
  const el = document.getElementById('tbl-footer');
  el.style.display = '';
  el.textContent = isFiltered
    ? `Menampilkan ${total} dari hasil filter`
    : `Total ${total} mahasiswa`;
}

// =====================
// Search & Filter
// =====================
let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const [sort, order] = (document.getElementById('filter-sort').value || 'created_at|DESC').split('|');
    loadData({
      search:   document.getElementById('search').value.trim(),
      jurusan:  document.getElementById('filter-jurusan').value,
      angkatan: document.getElementById('filter-angkatan').value,
      sort, order
    });
  }, 300);
}

// =====================
// TAMBAH MAHASISWA
// =====================
async function simpanMahasiswa() {
  clearFormErrors();
  const body = {
    nim:      document.getElementById('f-nim').value.trim(),
    nama:     document.getElementById('f-nama').value.trim(),
    jurusan:  document.getElementById('f-jurusan').value,
    angkatan: document.getElementById('f-angkatan').value,
    ipk:      document.getElementById('f-ipk').value || 0,
    email:    document.getElementById('f-email').value.trim(),
    no_hp:    document.getElementById('f-hp').value.trim()
  };

  const btn = document.getElementById('btn-simpan');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> Menyimpan...';

  try {
    const r    = await fetch(`${API}/mahasiswa`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await r.json();

    if (json.success) {
      showToast('✓ Mahasiswa berhasil disimpan ke database', 'ok');
      resetForm();
      loadData();
    } else {
      showToast(json.message, 'err');
      highlightErrors(json.errors, 'e-');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Simpan ke Database';
  }
}

// =====================
// EDIT MAHASISWA
// =====================
async function openEdit(id) {
  try {
    const r    = await fetch(`${API}/mahasiswa/${id}`);
    const json = await r.json();
    if (!json.success) { showToast('Gagal memuat data', 'err'); return; }
    const m = json.data;

    document.getElementById('edit-id').value      = m.id;
    document.getElementById('edit-nim').value     = m.nim;
    document.getElementById('edit-nama').value    = m.nama;
    document.getElementById('edit-jurusan').value = m.jurusan;
    document.getElementById('edit-angkatan').value= m.angkatan;
    document.getElementById('edit-ipk').value     = m.ipk;
    document.getElementById('edit-email').value   = m.email || '';
    document.getElementById('edit-hp').value      = m.no_hp || '';

    clearEditErrors();
    document.getElementById('modal-edit').classList.add('open');
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  }
}

function closeModal() {
  document.getElementById('modal-edit').classList.remove('open');
}

async function updateMahasiswa() {
  clearEditErrors();
  const id   = document.getElementById('edit-id').value;
  const body = {
    nim:      document.getElementById('edit-nim').value.trim(),
    nama:     document.getElementById('edit-nama').value.trim(),
    jurusan:  document.getElementById('edit-jurusan').value,
    angkatan: document.getElementById('edit-angkatan').value,
    ipk:      document.getElementById('edit-ipk').value || 0,
    email:    document.getElementById('edit-email').value.trim(),
    no_hp:    document.getElementById('edit-hp').value.trim()
  };

  const btn = document.getElementById('btn-update');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> Menyimpan...';

  try {
    const r    = await fetch(`${API}/mahasiswa/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await r.json();

    if (json.success) {
      showToast('✓ Data mahasiswa berhasil diupdate', 'ok');
      closeModal();
      loadData();
    } else {
      showToast(json.message, 'err');
      highlightErrors(json.errors, 'ee-');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Simpan Perubahan';
  }
}

// =====================
// HAPUS MAHASISWA
// =====================
async function hapus(id, nama) {
  if (!confirm(`Hapus data "${nama}" dari database?\n\nTindakan ini tidak dapat dibatalkan.`)) return;

  try {
    const r    = await fetch(`${API}/mahasiswa/${id}`, { method: 'DELETE' });
    const json = await r.json();
    if (json.success) {
      showToast('✓ ' + json.message, 'ok');
      loadData();
    } else {
      showToast(json.message, 'err');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  }
}

// =====================
// UI Helpers
// =====================
function resetForm() {
  ['f-nim','f-nama','f-angkatan','f-ipk','f-email','f-hp'].forEach(id => {
    document.getElementById(id).value = '';
    document.getElementById(id).classList.remove('err-field');
  });
  document.getElementById('f-jurusan').value = '';
  clearFormErrors();
}

function toggleForm() {
  const w = document.getElementById('form-wrap');
  w.style.display = w.style.display === 'none' ? '' : 'none';
}

function clearFormErrors() {
  ['nim','nama','jurusan','angkatan','ipk','email','hp'].forEach(f => {
    const el = document.getElementById(`e-${f}`);
    if (el) el.textContent = '';
  });
}

function clearEditErrors() {
  ['nim','nama','jurusan','angkatan','ipk','email','hp'].forEach(f => {
    const el = document.getElementById(`ee-${f}`);
    if (el) el.textContent = '';
  });
}

function highlightErrors(errors, prefix) {
  if (!errors) return;
  // Simple: just show them as toast if can't map
}

let toastTimer;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3500);
}

// XSS escape
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close modal on outside click
document.getElementById('modal-edit').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Keyboard: Esc to close modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// =====================
// Boot
// =====================
init();
</script>
